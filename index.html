<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Permissions-Policy for Aircall iframe features -->
    <meta http-equiv="Permissions-Policy" content="hid=*, microphone=*, autoplay=*, clipboard-read=*, clipboard-write=*, identity-credentials-get=*">
    <title>Support Hub</title>
    <meta name="description" content="One app to rule them all!">
    <meta name="author" content="Lovable" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Support Hub">
    <link rel="apple-touch-icon" href="/images/logo-support-hub.png">
    <meta name="theme-color" content="#1a1a2e">
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
  
  
  
  
  
  
  
  <link rel="icon" type="image/x-icon" href="https://storage.googleapis.com/gpt-engineer-file-uploads/dQsN7pdoKqQyuWodHhkkt3VceEE3/uploads/1760469734503-N-logo.png">
  <meta property="og:title" content="Support Hub">
  <meta name="twitter:title" content="Support Hub">
  <meta property="og:description" content="One app to rule them all!">
  <meta name="twitter:description" content="One app to rule them all!">
</head>

  <body>
    <!-- Aircall Workspace Container - Always available for SDK -->
    <div id="aircall-workspace-container" class="aircall-hidden">
      <div id="aircall-workspace"></div>
    </div>

    <!-- Static bootstrap screen - visible until React mounts -->
    <div id="app-bootstrap" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
      <div style="text-align:center;">
        <div id="bootstrap-spinner" style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#818cf8;border-radius:50%;margin:0 auto 16px;animation:bspin 0.8s linear infinite;"></div>
        <p id="bootstrap-text" style="font-size:16px;margin:0 0 8px;font-weight:500;">Loading Support Hub…</p>
        <p id="bootstrap-sub" style="font-size:13px;color:#94a3b8;margin:0;"></p>
        <div id="bootstrap-actions" style="display:none;margin-top:20px;">
          <button onclick="location.reload()" style="background:#818cf8;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:14px;cursor:pointer;margin:0 6px;">Reload Preview</button>
          <a href="https://lovable-customer-support-hub.lovable.app" target="_blank" rel="noopener" style="background:transparent;color:#818cf8;border:1px solid #818cf8;padding:8px 20px;border-radius:6px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;margin:0 6px;">Open Published App</a>
        </div>
      </div>
      <style>@keyframes bspin{to{transform:rotate(360deg)}}</style>
    </div>

    <script>
      // Stalled-load detection: if React hasn't mounted after 8s, show recovery UI
      window.__bootstrapTimer = setTimeout(function() {
        var el = document.getElementById('app-bootstrap');
        if (el && el.style.display !== 'none') {
          document.getElementById('bootstrap-spinner').style.borderTopColor = '#f59e0b';
          document.getElementById('bootstrap-text').textContent = 'Preview connection issue detected';
          document.getElementById('bootstrap-sub').textContent = 'The app failed to load. Try reloading or use the published URL.';
          document.getElementById('bootstrap-actions').style.display = 'block';
        }
      }, 8000);
    </script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
